name: Deploy to AWS EC2

on:
  push:
    branches: [aws-migration-test]

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: ffmpeg-library
  EC2_INSTANCE_IP: 3.15.13.6
  ECR_REGISTRY: 079464146245.dkr.ecr.us-east-2.amazonaws.com
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag $ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f ./Dockerfile.ffmpeg .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
