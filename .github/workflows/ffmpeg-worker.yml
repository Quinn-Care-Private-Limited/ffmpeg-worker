name: Build and Push Python Image to AWS ECR
on:
  push:
    branches: [aws-migration-test]

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: ffmpeg-worker-server
  IMAGE_NAME: ffmpeg-worker
  ECR_REGISTRY: 079464146245.dkr.ecr.us-east-2.amazonaws.com

jobs:
  build-push-ecr:
    name: Build and Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # - name: Build and Push Docker Image
      #   uses: docker/build-push-action@v4
      #   with:
      #     context: .
      #     platforms: linux/arm64
      #     push: true
      #     tags: |
      #       ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      # - name: Generate version tag
      #   id: version
      #   run: |
      #     VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
      #     echo "VERSION=$VERSION" >> $GITHUB_ENV

      # - name: Tag with version
      #   run: |
      #     docker pull --platform linux/arm64 $ECR_REGISTRY/$ECR_REPOSITORY:latest
      #     docker tag $ECR_REGISTRY/$ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION
      #     docker push $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION

      - name: Start Instance Refresh
        run: |
          # Start instance refresh to pull new image
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ffmpeg-worker \
            --preferences '{"MinHealthyPercentage": 50}'

      - name: Health Check
        run: |
          # Wait for instances to be healthy in target group
          aws elbv2 wait target-in-service \
            --target-group-arn arn:aws:elasticloadbalancing:us-east-2:079464146245:targetgroup/ffmpeg-worker-1/0b7c85e611a3aabc
